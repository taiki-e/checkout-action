name: checkout-action
description: GitHub Action for checking out a repository. (Simplified actions/checkout alternative that does not depend on Node.js.)

inputs:
  # repository:
  #   description: Repository name with owner. For example, actions/checkout
  #   default: ${{ github.repository }}
  # https://github.com/actions/checkout/issues/1161
  # https://github.com/actions/checkout/issues/1764
  # https://github.com/actions/checkout/issues/1634
  # https://github.com/actions/checkout/issues/1638
  # ref:
  #   description: >
  #     The branch, tag or SHA to checkout. When checking out the repository that
  #     triggered a workflow, this defaults to the reference or SHA for that
  #     event.  Otherwise, uses the default branch.
  # token:
  #   description: >
  #     Personal access token (PAT) used to fetch the repository. The PAT is configured
  #     with the local git config, which enables your scripts to run authenticated git
  #     commands. The post-job step removes the PAT.
  #
  #     We recommend using a service account with the least permissions necessary.
  #     Also when generating a new PAT, select the least scopes necessary.
  #
  #
  #     [Learn more about creating and using encrypted secrets](https://help.github.com/en/actions/automating-your-workflow-with-github-actions/creating-and-using-encrypted-secrets)
  #   default: ${{ github.token }}
  # ssh-key:
  #   description: >
  #     SSH key used to fetch the repository. The SSH key is configured with the local
  #     git config, which enables your scripts to run authenticated git commands.
  #     The post-job step removes the SSH key.
  #
  #     We recommend using a service account with the least permissions necessary.
  #
  #     [Learn more about creating and using
  #     encrypted secrets](https://help.github.com/en/actions/automating-your-workflow-with-github-actions/creating-and-using-encrypted-secrets)
  # ssh-known-hosts:
  #   description: >
  #     Known hosts in addition to the user and global host key database. The public
  #     SSH keys for a host may be obtained using the utility `ssh-keyscan`. For example,
  #     `ssh-keyscan github.com`. The public key for github.com is always implicitly added.
  # ssh-strict:
  #   description: >
  #     Whether to perform strict host key checking. When true, adds the options `StrictHostKeyChecking=yes`
  #     and `CheckHostIP=no` to the SSH command line. Use the input `ssh-known-hosts` to
  #     configure additional hosts.
  #   default: true
  # ssh-user:
  #   description: >
  #     The user to use when connecting to the remote SSH host. By default 'git' is used.
  #   default: git
  # persist-credentials:
  #   description: 'Whether to configure the token or SSH key with the local git config'
  #   default: true
  # https://github.com/actions/checkout/issues/1770
  # https://github.com/actions/checkout/issues/1812
  # https://github.com/pranavpadmasali/checkout-action/commit/791fdb64c33749d8f288421d2f756c60b20c92bd
  # path:
  #   description: Relative path under $GITHUB_WORKSPACE to place the repository
  # clean:
  #   description: Whether to execute `git clean -ffdx && git reset --hard HEAD` before fetching
  #   default: 'true'
  # https://github.com/actions/checkout/issues/1714
  # filter:
  #   description: >
  #     Partially clone against a given filter.
  #     Overrides sparse-checkout if set.
  #   default: 'null'
  # sparse-checkout:
  #   description: >
  #     Do a sparse checkout on given patterns.
  #     Each pattern should be separated with new lines.
  #   default: 'null'
  # sparse-checkout-cone-mode:
  #   description: >
  #     Specifies whether to use cone-mode when doing a sparse checkout.
  #   default: 'true'
  # https://github.com/actions/checkout/issues/1734
  # https://github.com/actions/checkout/issues/1734
  # https://github.com/actions/checkout/issues/329
  # https://github.com/actions/checkout/issues/882
  # https://github.com/changesets/action/issues/201
  # https://github.com/actions/checkout/issues/773
  # https://github.com/actions/checkout/issues/659
  # https://github.com/actions/checkout/issues/477
  # https://github.com/actions/checkout/pull/1506
  fetch-depth:
    description: Number of commits to fetch. 0 indicates all history for all branches and tags.
    default: '1'
  # https://github.com/actions/checkout/issues/1467
  # https://github.com/actions/checkout/issues/1662
  # https://github.com/actions/checkout/issues/1781
  # https://github.com/actions/checkout/issues/1471
  # https://github.com/actions/checkout/issues/1467
  # fetch-tags:
  #   description: Whether to fetch tags, even if fetch-depth > 0.
  #   default: 'false'
  # https://github.com/actions/checkout/issues/1746
  # show-progress:
  #   description: Whether to show progress status output when fetching.
  #   default: 'true'
  # lfs:
  #   description: Whether to download Git-LFS files
  #   default: 'false'
  # https://github.com/actions/checkout/issues/1766
  # https://github.com/actions/checkout/issues/1815
  # https://github.com/actions/checkout/issues/1751
  # https://github.com/actions/checkout/issues/367
  # submodules:
  #   description: >
  #     Whether to checkout submodules: `true` to checkout submodules or `recursive` to
  #     recursively checkout submodules.
  #
  #     When the `ssh-key` input is not provided, SSH URLs beginning with `git@github.com:` are
  #     converted to HTTPS.
  #   default: 'false'
  set-safe-directory:
    description: Add repository path as safe.directory for Git global config by running `git config --global --add safe.directory <path>`
    default: 'true'
  # https://github.com/actions/checkout/issues/1817
  github-server-url:
    description: The base URL for the GitHub instance that you are trying to clone from, will use environment defaults to fetch from the same instance that the workflow is running from unless specified. Example URLs are https://github.com or https://my-ghes-server.example.com
    required: false

# Note:
# - inputs.* should be manually mapped to INPUT_* due to https://github.com/actions/runner/issues/665
# - Use GITHUB_*/RUNNER_* instead of github.*/runner.* due to https://github.com/actions/runner/issues/2185
runs:
  using: composite
  steps:
    - run: |
        set -eu
        if ! command -v bash >/dev/null; then
          if grep -Eq '^ID=alpine' /etc/os-release; then
            printf '::group::Install packages required for checkout-action (bash)\n'
            # NB: sync with apk_install in main.sh
            if command -v sudo >/dev/null; then
              sudo apk --no-cache add bash
            elif command -v doas >/dev/null; then
              doas apk --no-cache add bash
            else
              apk --no-cache add bash
            fi
            printf '::endgroup::\n'
          elif grep -Eq '^ID_LIKE=.*openwrt' /etc/os-release; then
            printf '::group::Install packages required for checkout-action (bash)\n'
            # NB: sync with opkg_install in main.sh
            if command -v sudo >/dev/null; then
              sudo mkdir -p /var/lock
              sudo opkg update
              sudo opkg install bash
            else
              mkdir -p /var/lock
              opkg update
              opkg install bash
            fi
            printf '::endgroup::\n'
          else
            printf '::error::checkout-action requires bash\n'
            exit 1
          fi
        fi
        bash --noprofile --norc "${GITHUB_ACTION_PATH:?}/main.sh"
      shell: sh
      env:
        # INPUT_REPOSITORY: ${{ inputs.repository }}
        # INPUT_REF: ${{ inputs.ref }}
        INPUT_FETCH_DEPTH: ${{ inputs.fetch-depth }}
        INPUT_SET_SAFE_DIRECTORY: ${{ inputs.set-safe-directory }}
        INPUT_GITHUB_SERVER_URL: ${{ inputs.github-server-url }}
      if: runner.os	!= 'Windows'
    - run: bash --noprofile --norc "${GITHUB_ACTION_PATH:?}/main.sh"
      shell: bash
      env:
        # INPUT_REPOSITORY: ${{ inputs.repository }}
        # INPUT_REF: ${{ inputs.ref }}
        INPUT_FETCH_DEPTH: ${{ inputs.fetch-depth }}
        INPUT_SET_SAFE_DIRECTORY: ${{ inputs.set-safe-directory }}
        INPUT_GITHUB_SERVER_URL: ${{ inputs.github-server-url }}
      if: runner.os	== 'Windows'
