name: checkout-action
description: GitHub Action for checking out a repository. (Simplified actions/checkout alternative that does not depend on Node.js.)

inputs:
  token:
    description: GitHub token for checking out a repository.
    required: false

# Note:
# - inputs.* should be manually mapped to INPUT_* due to https://github.com/actions/runner/issues/665
# - For context containing path, use GITHUB_*/RUNNER_* instead of github.*/runner.* due to https://github.com/actions/runner/issues/2185
runs:
  using: composite
  steps:
    - run: |
        if command -v /bin/grep >/dev/null; then
          grep=/bin/grep
        elif command -v /usr/bin/grep >/dev/null; then
          grep=/usr/bin/grep
        else
          grep=$(command -v grep)
          printf '::warning::grep is unavailable at standard location; using %s\n' "${grep}"
        fi
        if /usr/bin/env | "${grep}" -Eq '^BASH_FUNC_'; then
          printf '::error::bash function injection via BASH_FUNC_ environment variable is not allowed for security reasons\n'
          exit 1
        fi
        if ! command -v bash >/dev/null; then
          if "${grep}" -Eq '^ID=alpine' /etc/os-release; then
            printf '::group::Install packages required for checkout-action (bash)\n'
            # NB: sync with apk_install in main.sh
            if command -v sudo >/dev/null; then
              sudo apk --no-cache add bash
            elif command -v doas >/dev/null; then
              doas apk --no-cache add bash
            else
              apk --no-cache add bash
            fi
            printf '::endgroup::\n'
          elif "${grep}" -Eq '^ID_LIKE=.*openwrt' /etc/os-release; then
            printf '::group::Install packages required for checkout-action (bash)\n'
            # NB: sync with opkg_install in main.sh
            if command -v sudo >/dev/null; then
              sudo mkdir -p /var/lock
              sudo opkg update
              sudo opkg install bash
            else
              mkdir -p /var/lock
              opkg update
              opkg install bash
            fi
            printf '::endgroup::\n'
          else
            printf '::error::checkout-action requires bash\n'
            exit 1
          fi
        fi
        if command -v /bin/bash >/dev/null; then
          /bin/bash --noprofile --norc "${GITHUB_ACTION_PATH:?}/main.sh"
        else
          printf '::warning::bash is unavailable at standard location; using %s\n' "$(command -v bash)"
          bash --noprofile --norc "${GITHUB_ACTION_PATH:?}/main.sh"
        fi
      shell: /usr/bin/env -u ENV -u BASH_ENV -u CDPATH -u SHELLOPTS -u BASHOPTS /bin/sh -eu {0} # zizmor: ignore[misfeature] false positive
      env:
        # NB: Sync with Windows case.
        INPUT_TOKEN: ${{ inputs.token }}
        # TODO: support in input options
        INPUT_REPOSITORY: ${{ github.repository }}
        INPUT_SERVER_URL: ${{ github.server_url }}
        INPUT_SHA: ${{ github.sha }}
        INPUT_REF: ${{ github.ref }}
      if: runner.os != 'Windows'
    # Use pwsh and retry on bash startup failure to work around windows-11-arm runner bug:
    # https://github.com/actions/partner-runner-images/issues/169
    - run: |
        Set-StrictMode -Version Latest
        if (Test-Path "Env:ENV") { Remove-Item Env:\ENV }
        if (Test-Path "Env:BASH_ENV") { Remove-Item Env:\BASH_ENV }
        if (Test-Path "Env:CDPATH") { Remove-Item Env:\CDPATH }
        if (Test-Path "Env:SHELLOPTS") { Remove-Item Env:\SHELLOPTS }
        if (Test-Path "Env:BASHOPTS") { Remove-Item Env:\BASHOPTS }
        if (Test-Path "Env:BASH_FUNC_*") {
          Write-Output "::error::bash function injection via BASH_FUNC_ environment variable is not allowed for security reasons"
          exit 1
        }
        $bash = (Get-Command bash).Path
        switch ($bash) {
          "C:\Program Files\Git\bin\bash.exe" {} # default
          "C:\msys64\usr\bin\bash.exe" {} # msys64
          "C:\tools\cygwin\bin\bash.exe" {} # cygwin
          default {
            Write-Output "::warning::bash is unavailable at standard location; using $bash"
          }
        }
        for ($i=1; $i -le 10; $i++) {
          $prev_err_action = $ErrorActionPreference
          $ErrorActionPreference = "Continue"
          & bash --noprofile --norc "$env:GITHUB_ACTION_PATH\main.sh"
          $code = $LASTEXITCODE
          $ErrorActionPreference = "$prev_err_action"
          if (Test-Path "$env:USERPROFILE\.checkout-action-init") {
            # If bash started successfully, main.sh creates init file.
            Remove-Item "$env:USERPROFILE\.checkout-action-init" -Force
            exit $code
          }
          if ($i -lt 10) {
            Write-Output "::warning::installation failed due to bash startup failure (<https://github.com/actions/partner-runner-images/issues/169>); retrying..."
          }
        }
        Write-Output "::error::installation failed due to bash startup failure (<https://github.com/actions/partner-runner-images/issues/169>); this maybe resolved by re-running job"
        exit 1
      shell: pwsh
      env:
        # NB: Sync with non-Windows case.
        INPUT_TOKEN: ${{ inputs.token }}
        # TODO: support in input options
        INPUT_REPOSITORY: ${{ github.repository }}
        INPUT_SERVER_URL: ${{ github.server_url }}
        INPUT_SHA: ${{ github.sha }}
        INPUT_REF: ${{ github.ref }}
      if: runner.os == 'Windows'
